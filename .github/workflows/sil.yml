name: SIL Verification

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  lint-and-test:
    name: Static analysis & host tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq cppcheck

      - name: cppcheck
        run: make lint

      - name: Host unit tests
        run: make test-host

  sil-verify:
    name: SIL verification (Cortex-M4)
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4

      - name: Set up environment
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq gcc-arm-none-eabi libnewlib-arm-none-eabi
          wget -q https://builds.renode.io/renode-latest.linux-portable.tar.gz -O /tmp/emu.tar.gz
          mkdir -p /opt/renode
          tar xzf /tmp/emu.tar.gz -C /opt/renode --strip-components=1
          echo "/opt/renode" >> $GITHUB_PATH
          pip install pyyaml

      - name: Build firmware
        run: make build

      - name: Run castus SIL gate
        run: ./castus --verify . --live
